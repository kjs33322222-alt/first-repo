name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log file
        run: |
          echo "Commit at $(date -u)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "박승수"
          git config user.email "kjs33322222@gmail.com"
          git add log.txt
          git commit -m "chore: daily commit" || echo "No changes to commit"
          git push
